name: Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar o código
      - name: Checkout código
        uses: actions/checkout@v3

      # 2️⃣ Instalar Java 21
      - name: Instalar Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # 3️⃣ Ver estrutura do projeto (opcional, ajuda no debug)
      - name: Ver estrutura
        run: ls -R

      # 4️⃣ Build do backend Spring Boot
      - name: Build backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests