version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: gestao-quadrangular-db
    restart: always
    environment:
      POSTGRES_DB: gestao-quadrangular
      POSTGRES_USER: wash
      POSTGRES_PASSWORD: 2503
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: spring_backend
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gestao-quadrangular
      SPRING_DATASOURCE_USERNAME: wash
      SPRING_DATASOURCE_PASSWORD: 2503

  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8081

volumes:
  postgres_data: