# ============================================
# CONFIGURACOES DO BANCO DE DADOS
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/gestao-quadrangular
spring.datasource.username=wash
spring.datasource.password=2503
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# CONFIGURACOES DO JPA / HIBERNATE
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# CONFIGURACOES DO SERVIDOR
# ============================================
server.port=8080
server.servlet.context-path=/api

# ============================================
# CONFIGURACOES DO JWT
# ============================================
jwt.secret=S3CR3T_K3Y_S1ST3M4_1GR3J4_2024_M41S_S3GUR4_P0SS1V3L
jwt.expiration=86400000

# ============================================
# CONFIGURACOES DE CORS
# ============================================
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ============================================
# CONFIGURACOES DE UPLOAD
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# CONFIGURACOES DE LOG
# ============================================
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.gestaoigrejaemcelula=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================
# CONFIGURACOES DO FLYWAY
# ============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration